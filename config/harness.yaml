harness:
  run_dir: /var/lib/harness/run
  session_ttl: 2h
  max_sessions: 30

  network:
    cidr_pool: 10.200.0.0/16
    egress:
      doris_fe_hosts:
        - 172.16.0.138
      doris_be_hosts:
        - 172.16.0.138
      doris_ports:
        - 9030
      dns_policy: hostnames_only

  events:
    retention_window: 24h
    retention_rows: 1000000
    emit_output_batch_max_rows: 64
    emit_output_batch_max_age: 100ms

  probe:
    accept_status:
      get_healthz:
        - 200
      post_v1_messages:
        unauthorized:
          - 401
        malformed_authenticated:
          - 400
    pre_start_attempts: 3
    pre_start_interval: 500ms
    post_start_attempts: 5
    post_start_interval: 1s

  bridge:
    lease_ttl: 60s
    heartbeat_interval: 30s
    poll_interval: 10ms
    ack_started_grace: 90s
    reconnect_grace: 30s

  checkpoint:
    auto_enabled: false
    idle_threshold: 30m
    monitor_interval: 5m

  reaper:
    failed_retention: 10m

  secrets:
    root: /var/lib/harness/secrets
    readers_gid: 65501
